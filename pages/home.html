<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAMBEZI FUTURES | Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Global + Components -->
    <link rel="stylesheet" href="../css/components.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../css/home.css">
</head>

<body data-page="home" data-access="public">

    <!-- NAVBAR -->
    <div id="navbarContainer"></div>

    <!-- HERO -->
    <header class="homepage-hero">
        <div class="container">
            <div class="row">
                <div class="col-lg-8">
                    <h1 class="hero-title text-white mb-4">
                        Welcome to<br>
                        <span style="color: var(--gold);">Zambezi Futures</span><br>
                        Registration Hub
                    </h1>

                    <p class="lead text-white mb-5 opacity-75 fw-medium" style="max-width:540px;">
                        The elite digital archive and training ground for Southern Africa's premier football talent.
                    </p>

                    <a href="login.html" class="btn btn-outline-light btn-lg px-5 py-3 fw-bold">
                        Sign In
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- STATS -->
    <section class="pb-5">
        <div class="container">
            <div class="row g-4 stat-card-row">

                <div class="col-md-4">
                    <div class="card text-center py-5">
                        <h2 id="totalAcademies" class="display-4 fw-bold">50+</h2>
                        <p class="text-muted">Total Academies</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-center py-5">
                        <h2 id="totalPlayers" class="display-4 fw-bold">5000+</h2>
                        <p class="text-muted">Registered Players</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card text-center py-5">
                        <h2 id="totalTeams" class="display-4 fw-bold">200+</h2>
                        <p class="text-muted">Active Teams</p>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- ACADEMIES -->
    <section class="py-5">
        <div class="container my-4">

            <div class="d-flex justify-content-between align-items-end mb-5">
                <h3 class="display-6 fw-bold">Elite Academies</h3>
                <!-- <a href="database.html" class="fw-bold">View All →</a> -->
            </div>

            <div class="academy-carousel-wrapper">
                <div class="academy-carousel-track" id="academiesContainer"></div>
            </div>
                <!-- Injected by JS -->
            </div>
    </section>

    <!-- FOOTER -->
    <div id="footerContainer"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/home.js"></script>

</body>
</html>
