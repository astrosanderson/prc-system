<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Management Hub | Zambezi Futures</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin-dashboard.css">
</head>
<body data-page="management-hub" data-access="admin">
  <div id="navbarContainer"></div>

  <main class="container-xxl py-5">
    <header class="row align-items-end mb-5 g-4 hero-section">
      <div class="col-lg-8">
        <span class="text-secondary fw-bold text-uppercase fs-7 tracking-widest mb-1 d-block">Admin Tools</span>
        <h1 class="editorial-header display-3 fw-900 text-primary mb-0">Management <span class="text-secondary">Hub</span></h1>
        <p class="mt-3 text-muted fw-bold mb-0">Manage representatives, admins, academies, assignments, and registration dates.</p>
      </div>
    </header>

    <section class="row g-4">
      <div class="col-xl-6">
        <div class="widget">
          <h3 class="widget-title text-primary">Team Members</h3>
          <form id="teamMemberForm" class="row g-3 mb-4">
            <input type="hidden" id="teamMemberId">
            <div class="col-md-4"><input type="text" class="form-control" id="teamMemberName" placeholder="Representative name" required></div>
            <div class="col-md-4"><input type="email" class="form-control" id="teamMemberEmail" placeholder="Email address" required></div>
            <div class="col-md-4"><select class="form-select" id="teamMemberAcademy" required></select></div>
            <div class="col-12 d-flex gap-2">
              <button class="btn btn-dark btn-sm px-4" type="submit">Save Member</button>
              <button class="btn btn-light btn-sm px-4" type="button" id="teamMemberReset">Clear</button>
            </div>
          </form>
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead><tr><th>Name</th><th>Academy</th><th>Email</th><th class="text-end">Action</th></tr></thead>
              <tbody id="teamMembersTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-xl-6">
        <div class="widget">
          <h3 class="widget-title text-primary">Admins</h3>
          <form id="adminUserForm" class="row g-3 mb-4">
            <input type="hidden" id="adminUserId">
            <div class="col-md-4"><input type="text" class="form-control" id="adminUserName" placeholder="Admin name" required></div>
            <div class="col-md-4"><input type="email" class="form-control" id="adminUserEmail" placeholder="Email address" required></div>
            <div class="col-md-4"><input type="text" class="form-control" id="adminUserRole" placeholder="Role title" required></div>
            <div class="col-12 d-flex gap-2">
              <button class="btn btn-dark btn-sm px-4" type="submit">Save Admin</button>
              <button class="btn btn-light btn-sm px-4" type="button" id="adminUserReset">Clear</button>
            </div>
          </form>
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead><tr><th>Name</th><th>Role</th><th>Email</th><th class="text-end">Action</th></tr></thead>
              <tbody id="adminsTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-xl-7">
        <div class="widget">
          <h3 class="widget-title text-primary">Academies</h3>
          <form id="academyForm" class="row g-3 mb-4">
            <input type="hidden" id="academyId">
            <div class="col-md-3"><input type="text" class="form-control" id="academyName" placeholder="Academy name" required></div>
            <div class="col-md-3"><input type="text" class="form-control" id="academyLocation" placeholder="Location" required></div>
            <div class="col-md-4"><input type="url" class="form-control" id="academyLogo" placeholder="Logo image URL"></div>
            <div class="col-md-2"><button class="btn btn-dark w-100" type="submit">Save</button></div>
          </form>
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead><tr><th>Logo</th><th>Academy</th><th>Location</th><th>Rep</th><th class="text-end">Action</th></tr></thead>
              <tbody id="academyTable"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-xl-5">
        <div class="widget">
          <h3 class="widget-title text-primary">Registration Window</h3>
          <form id="registrationSettingsForm" class="row g-3">
            <div class="col-12">
              <label class="form-label small fw-bold text-uppercase text-muted">Opening date/time</label>
              <input type="datetime-local" class="form-control" id="registrationOpen">
            </div>
            <div class="col-12">
              <label class="form-label small fw-bold text-uppercase text-muted">Closing date/time</label>
              <input type="datetime-local" class="form-control" id="registrationClose">
            </div>
            <div class="col-12">
              <button class="btn btn-dark w-100" type="submit">Save Registration Window</button>
            </div>
          </form>
        </div>

        <div class="widget widget-dark">
          <h3 class="widget-title">Past Games</h3>
          <form id="gameForm" class="row g-2 mb-3">
            <input type="hidden" id="gameId">
            <div class="col-12"><input type="text" class="form-control" id="gameFixture" placeholder="Fixture" required></div>
            <div class="col-6"><input type="date" class="form-control" id="gameDate" required></div>
            <div class="col-6"><input type="text" class="form-control" id="gameScore" placeholder="Score" required></div>
            <div class="col-12"><button class="btn btn-light btn-sm px-4" type="submit">Save Game</button></div>
          </form>
          <div id="gamesList"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="footerContainer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/management-hub.js"></script>
</body>
</html>
