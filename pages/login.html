<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zambezi Futures | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- GLOBAL COMPONENTS -->
    <link rel="stylesheet" href="../css/components.css">

    <!-- PAGE CSS -->
    <link rel="stylesheet" href="../css/login.css">
</head>

<body data-page="login" data-access="public">

    <!-- NAVBAR -->
    <div id="navbarContainer"></div>

    <!-- MAIN -->
    <main class="container hero-container">
        <div class="row w-100 align-items-center">

            <!-- LEFT -->
            <div class="col-lg-6 mb-5 mb-lg-0">
                <span class="portal-label">Academy Portal</span>

                <h1 class="welcome-title">
                    WELCOME<br>
                    <span>BACK</span>
                </h1>

                <p class="hero-description">
                    Access the elite performance ecosystem.
                </p>

                <div class="performance-card">
                    <h5>Elite Performance Journal</h5>
                    <p>Digital Archive of Excellence</p>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="col-lg-6">
                <div class="login-cards-wrapper">

                    <!-- MEMBER -->
                    <div class="login-card card-member" id="memberLoginCard">
                        <div class="icon-box">
                            <i class="bi bi-mortarboard-fill"></i>
                        </div>

                        <h2 class="card-title">Member Sign In</h2>
                        <p class="card-subtitle">Athlete & Scholar Access</p>

                        <a href="#" class="google-btn" id="memberLoginBtn">
                            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png">
                            Sign in with Google
                        </a>
                    </div>

                    <!-- ADMIN -->
                    <div class="login-card card-admin" id="adminLoginCard">
                        <div class="icon-box">
                            <i class="bi bi-shield-lock-fill"></i>
                        </div>

                        <h2 class="card-title">Admin Sign In</h2>
                        <p class="card-subtitle">Faculty & Management Only</p>

                        <a href="#" class="google-btn" id="adminLoginBtn">
                            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png">
                            Admin Google Login
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <div id="footerContainer"></div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/login.js"></script>

</body>
</html>
