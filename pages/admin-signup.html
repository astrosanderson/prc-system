<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Signup | Zambezi Futures</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
     <link rel="stylesheet" href="../css/admin-signup.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card p-4 p-md-5 border-0 shadow-lg">
                    <div class="text-center mb-5">
                        <a href="signup.html" class="d-inline-flex align-items-center gap-2 text-decoration-none text-muted fw-bold small text-uppercase mb-3">
                            <span class="material-symbols-outlined fs-6">arrow_back</span> Back
                        </a>
                        <h1 class="h3 fw-black text-primary">ADMIN SIGNUP</h1>
                        <p class="text-muted small fw-bold">For coaches, scouts, and academy managers</p>
                    </div>

                    <form action="signin.html">
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">First Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">Last Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">Email Address</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">Role</label>
                            <select class="form-select" required>
                                <option value="" disabled selected>Select your role</option>
                                <option>Head Coach</option>
                                <option>Assistant Coach</option>
                                <option>Academy Manager</option>
                                <option>Scout</option>
                                <option>Player Manager</option>
                                <option>Medical Staff</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">Academy / Organisation</label>
                            <input type="text" class="form-control" placeholder="e.g. Zambezi North Elite" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase text-muted">Admin Access Code</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><span class="material-symbols-outlined fs-5 text-muted">vpn_key</span></span>
                                <input type="text" class="form-control" placeholder="Provided by academy lead" required>
                            </div>
                            <div class="form-text small">Contact your academy administrator for your access code.</div>
                        </div>
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">Password</label>
                                <input type="password" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold text-uppercase text-muted">Confirm Password</label>
                                <input type="password" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-5">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="adminTerms" required>
                                <label class="form-check-label small text-muted" for="adminTerms">
                                    I agree to the <a href="#" class="fw-bold text-decoration-none" style="color: var(--accent-color);">Terms of Service</a> and <a href="#" class="fw-bold text-decoration-none" style="color: var(--accent-color);">Privacy Policy</a>
                                </label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-gold w-100 py-3 fw-bold">REQUEST ADMIN ACCESS</button>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top">
                        <p class="small text-muted fw-medium mb-0">Already have an account? <a href="signin.html" class="fw-bold text-decoration-none" style="color: var(--accent-color);">Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
