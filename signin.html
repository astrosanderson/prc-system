<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Zambezi Futures</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="card p-4 p-md-5 border-0 shadow-lg" style="max-width: 450px; width: 100%;">
            <div class="text-center mb-5">
                <a href="index.html" class="text-decoration-none">
                    <img src="https://lh3.googleusercontent.com/aida/ADBb0uiCKz2IEXlmfk9nb0UVNmGO2UMnYBrYpn7vRMu0LVCrlR_x2cmMNmRYx4wQTGeVRChKMNcVlLcN1PpaZjQ9K8McDFTzjC4oDa5As1RUNImpMgwRadVYjzh0c_UcaYBEMk_tn46MRfHx7pFbBkGALWmoU0j_9ATZBD-ID5QbJOCVx2m3IMiNZ1wIbMdIrvR7etXEbugERRB3h7WjBVvlV335euRZYxRG_pflBVnlKnRz45Hv0yIdgMcxugTDJ2Ip7DM62XbuBM7ljw" alt="Logo" height="40" class="mb-3">
                    <h1 class="h4 fw-black text-primary">ZAMBEZI FUTURES</h1>
                </a>
                <p class="text-muted small fw-bold mt-2">Elite Athlete & Academy Analytics Portal</p>
            </div>

            <form action="admin.html">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase ls-wide text-muted">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><span class="material-symbols-outlined fs-5 text-muted">mail</span></span>
                        <input type="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label small fw-bold text-uppercase ls-wide text-muted">Password</label>
                        <a href="#" class="small text-decoration-none text-gold fw-bold">Forgot?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><span class="material-symbols-outlined fs-5 text-muted">lock</span></span>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-4">SIGN IN</button>
            </form>

            <div class="text-center">
                <p class="small text-muted fw-medium mb-0">Don't have an account? <a href="signup.html" class="text-gold fw-bold text-decoration-none">Create Account</a></p>
            </div>
        </div>
    </div>

</body>
</html>
